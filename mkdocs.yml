site_name: latamdata-py
site_description: Python package for one-line access to open Latin American research datasets
site_url: https://juanmoisesd.github.io/latamdata-py/
site_author: Juan Moisés de la Serna

repo_name: juanmoisesd/latamdata-py
repo_url: https://github.com/juanmoisesd/latamdata-py
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.tabs.link
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Datasets:
    - Overview: datasets/overview.md
    - Catalog: datasets/catalog.md
  - API Reference:
    - latamdata: api/latamdata.md
  - Contributing: contributing.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/juanmoisesd
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/latamdata-py/
  analytics:
    provider: google
    property: ""

copyright: >
  Copyright &copy; 2024-2026 Juan Moisés de la Serna —
  <a href="https://orcid.org/0000-0003-4470-0468">ORCID</a>
